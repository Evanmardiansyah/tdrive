<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDrive - Unlimited Storage</title>
  <meta name="theme-color" content="#2563eb">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; 
      background-color: #f8fafc; 
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Iframe kosong, URL-nya akan diisi oleh JavaScript di bawah -->
  <iframe 
    id="gasFrame"
    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>

  <script>
    // URL Web App Google Script kamu
    const gasBaseUrl = "https://script.google.com/macros/s/AKfycbxiRdipzExtv3m3ptLRSoTs5zQgte5HGEi9WGe1NNjYmXZjrQsIqxOAI5C7W4y864lDqw/exec";
    
    // Ambil parameter dari URL GitHub (misal: ?file=BQACAg...)
    const urlParams = window.location.search;
    
    // Gabungkan dan pasang ke Iframe
    document.getElementById('gasFrame').src = gasBaseUrl + urlParams;
  </script>

</body>
</html>
